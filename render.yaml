services:
  - type: web
    name: b2b-leads-dev
    runtime: python
    plan: free
    branch: dev
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port=10000 --server.address=0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENV
        value: dev
    autoDeploy: true
    
  - type: web
    name: b2b-leads-staging
    runtime: python
    plan: free
    branch: staging
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port=10000 --server.address=0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENV
        value: staging
    autoDeploy: false